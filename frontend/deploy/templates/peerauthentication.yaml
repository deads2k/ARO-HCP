apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: aro-hcp-frontend-metrics
  namespace: '{{ .Release.Namespace }}'
spec:
  selector:
    matchLabels:
      app: aro-hcp-frontend
  portLevelMtls:
    8081:
      mode: PERMISSIVE
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: aro-hcp-frontend-v2-metrics
  namespace: '{{ .Release.Namespace }}'
spec:
  selector:
    matchLabels:
      app: aro-hcp-frontend-v2
  portLevelMtls:
    8081:
      mode: PERMISSIVE
